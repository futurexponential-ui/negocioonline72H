<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago rechazado | Negocio Online 72H</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--gray-bg); }
    .message-box { background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: var(--shadow); max-width: 500px; margin: 20px; }
    .message-box h1 { color: #ef4444; margin-bottom: 16px; }
    .message-box p { margin-bottom: 24px; color: var(--gray-text); }
    .btn { display: inline-block; background: var(--deep-blue); color: white; padding: 12px 30px; border-radius: 100px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="message-box">
    <h1>Pago no procesado</h1>
    <p>El pago no se pudo completar. Puedes intentarlo de nuevo o comunicarte directamente por WhatsApp para asistencia.</p>
    <a href="/" class="btn">Intentar de nuevo</a>
  </div>
</body>
</html>
